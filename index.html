<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>염창역 최애 가게 응원 릴레이</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-4xl mx-auto px-4 py-8">
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="flex justify-center mb-3">
        <div class="w-12 h-12 bg-gradient-to-br from-pink-500 to-rose-500 rounded-3xl flex items-center justify-center text-3xl">❤️</div>
      </div>
      <h1 class="text-4xl font-bold tracking-tighter">염창역 최애 가게 응원 릴레이</h1>
      <p class="text-zinc-400 mt-2">내가 사랑하는 염창역 가게에 따뜻한 응원을 남겨주세요</p>
    </div>

    <!-- 목2동 주민센터 행사 배너 -->
    <div class="mb-10 bg-gradient-to-r from-emerald-900/80 to-teal-900/80 border border-emerald-700 rounded-3xl p-8">
      <div class="flex flex-col md:flex-row items-center gap-6">
        <div class="flex-1">
          <div class="inline-flex items-center gap-2 bg-emerald-500/20 text-emerald-300 px-4 py-1 rounded-full text-sm mb-3">
            <span>📅</span> <span class="font-semibold">5월 가정의 달 행사</span>
          </div>
          <h2 class="text-2xl font-bold">목2동 주민센터와 함께하는 동네 행사</h2>
          <p class="text-emerald-100 mt-2">염창역 인근 주민 + 소상공인이 함께 참여하는 따뜻한 행사예요.</p>
        </div>
        <div class="text-center">
          <div class="text-5xl mb-1">🏠</div>
          <div class="text-xs text-emerald-300">목2동 주민센터 주관</div>
        </div>
      </div>
    </div>

    <!-- 응원 메시지 작성 폼 -->
    <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8 mb-10">
      <h3 class="font-bold text-xl mb-5 flex items-center gap-2">
        <span>✍️</span> 응원 메시지 남기기
      </h3>
      
      <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
        <div class="md:col-span-4">
          <label class="text-sm text-zinc-400 block mb-1.5">최애 가게</label>
          <select id="shopSelect" class="w-full bg-zinc-950 border border-zinc-700 px-4 py-3 rounded-2xl">
            <option value="호카호카">호카호카 (디저트)</option>
            <option value="두아드">두아드 (파티세리)</option>
            <option value="올라피자">올라피자 (피자)</option>
            <option value="민차이">민차이 (중식)</option>
            <option value="비빕밥비빔">비빕밥비빔 (한식)</option>
          </select>
        </div>
        
        <div class="md:col-span-4">
          <label class="text-sm text-zinc-400 block mb-1.5">이름 (선택)</label>
          <input id="authorInput" placeholder="익명" class="w-full bg-zinc-950 border border-zinc-700 px-4 py-3 rounded-2xl">
        </div>
        
        <div class="md:col-span-12">
          <label class="text-sm text-zinc-400 block mb-1.5">응원 메시지</label>
          <div class="flex gap-3">
            <input id="messageInput" placeholder="사장님 항상 맛있게 해주셔서 감사해요! ❤️" 
                   class="flex-1 bg-zinc-950 border border-zinc-700 px-4 py-3 rounded-2xl">
            <button onclick="addCheer()" 
                    class="px-8 bg-gradient-to-r from-pink-500 to-rose-500 text-white font-bold rounded-2xl hover:brightness-110">
              응원하기
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 응원 릴레이 카드뉴스 -->
    <div>
      <div class="flex items-center justify-between mb-6 px-1">
        <div class="font-bold text-2xl flex items-center gap-2">
          <span>💌</span> 응원 릴레이
        </div>
        <div class="text-sm text-zinc-400">총 <span id="totalCount" class="font-mono text-pink-400 font-bold">187</span>개의 응원</div>
      </div>

      <div id="cheerList" class="space-y-4"></div>
    </div>

    <div class="text-center text-xs text-zinc-500 mt-16">Made for 염창 상권 • AI 활용 사례 공모전</div>
  </div>

  <script>
    let cheers = JSON.parse(localStorage.getItem('yeomchang_cheers') || '[]');

    const emojis = ['❤️', '🔥', '👏', '🌟', '💖', '🥰', '🙌', '✨', '💪', '🎉', '🥳', '💗', '🌸', '🍀'];

    function getRandomEmoji() {
      return emojis[Math.floor(Math.random() * emojis.length)];
    }

    function saveCheers() {
      localStorage.setItem('yeomchang_cheers', JSON.stringify(cheers));
    }

    function addCheer() {
      const shop = document.getElementById('shopSelect').value;
      const author = document.getElementById('authorInput').value || '익명';
      const message = document.getElementById('messageInput').value.trim();

      if (!message) {
        alert('응원 메시지를 입력해주세요!');
        return;
      }

      const newCheer = {
        id: Date.now(),
        shop: shop,
        author: author,
        message: message,
        emoji: getRandomEmoji(),
        time: '방금 전'
      };

      cheers.unshift(newCheer);
      saveCheers();
      renderCheers();

      // 입력 초기화
      document.getElementById('messageInput').value = '';
      document.getElementById('authorInput').value = '';

      // 카운트 업데이트
      updateCount();
    }

    function renderCheers() {
      const container = document.getElementById('cheerList');
      container.innerHTML = '';

      if (cheers.length === 0) {
        container.innerHTML = `
          <div class="text-center py-16 text-zinc-400">
            아직 응원이 없어요.<br>
            첫 번째 응원을 남겨주세요! ❤️
          </div>
        `;
        return;
      }

      cheers.forEach(cheer => {
        const card = document.createElement('div');
        card.className = `bg-zinc-900 border border-zinc-700 rounded-3xl p-6 hover:border-pink-500/50 transition`;
        card.innerHTML = `
          <div class="flex items-start gap-4">
            <div class="text-5xl flex-shrink-0 mt-1">${cheer.emoji}</div>
            
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-3 mb-2">
                <span class="font-bold text-pink-400">${cheer.shop}</span>
                <span class="text-xs text-zinc-500">${cheer.time}</span>
              </div>
              
              <div class="text-lg leading-relaxed">"${cheer.message}"</div>
              
              <div class="text-sm text-zinc-400 mt-3">— ${cheer.author}</div>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function updateCount() {
      document.getElementById('totalCount').textContent = cheers.length;
    }

    function init() {
      // 샘플 데이터 (처음 한 번만)
      if (cheers.length === 0) {
        cheers = [
          {id:1, shop:"호카호카", author:"염창러버", message:"케이크가 너무 귀엽고 맛있어요! 사장님 최고❤️", emoji:"❤️", time:"방금 전"},
          {id:2, shop:"두아드", author:"목동주민", message:"마들렌 진짜 미쳤어요... 매일 생각남", emoji:"🌟", time:"1시간 전"},
          {id:3, shop:"올라피자", author:"피자덕후", message:"화덕피자 중에 여기 진짜 1등!", emoji:"🔥", time:"어제"},
          {id:4, shop:"민차이", author:"중식러버", message:"짬뽕 국물이 시원하고 맛있어요", emoji:"👏", time:"어제"},
          {id:5, shop:"비빕밥비빔", author:"건강지킴이", message:"비빔밥 신선하고 양도 많아서 든든해요", emoji:"💖", time:"2일 전"},
        ];
        saveCheers();
      }

      renderCheers();
      updateCount();
    }

    window.onload = init;
  </script>
</body>
</html>
